<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Goat Kart GP - True Ultimate Edition</title>
    <style>
        html, body { 
            position: fixed; width: 100%; height: 100%; 
            margin: 0; overflow: hidden; background: #87CEEB; 
            font-family: 'Arial Black', sans-serif; 
            touch-action: none; -webkit-overflow-scrolling: none;
            -webkit-user-select: none; user-select: none;
        }
        
        #start-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 999; background: rgba(0,0,0,0.3);
        }

        #html-start-btn {
            padding: 25px 50px; font-size: 28px; font-family: 'Arial Black', sans-serif; font-weight: bold;
            color: #000; background: #ffeb3b; border: 4px solid #fff; border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); cursor: pointer; animation: pulse 1s infinite alternate;
            -webkit-tap-highlight-color: transparent;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        
        #countdown { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; color: #fff; text-shadow: 0 0 30px #f00, 4px 4px 0 #000; z-index: 150; display: none; pointer-events: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; z-index: 10; font-size: 12px; pointer-events: none; opacity: 0; }
        #item-slot { position: absolute; top: 10px; right: 10px; width: 75px; height: 75px; background: rgba(0,0,0,0.5); border: 3px solid #fff; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 10; pointer-events: none; opacity: 0; }

        .touch-btn { 
            position: absolute; background: rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.6); border-radius: 50%; 
            color: white; display: flex; justify-content: center; align-items: center; z-index: 500; display: none; font-size: 24px;
            -webkit-tap-highlight-color: transparent;
        }
        #btn-left { bottom: 30px; left: 20px; width: 75px; height: 75px; }
        #btn-right { bottom: 30px; left: 105px; width: 75px; height: 75px; }
        #btn-accel { bottom: 30px; right: 20px; width: 100px; height: 100px; background: rgba(76, 175, 80, 0.5); }
        #btn-item { bottom: 140px; right: 20px; width: 75px; height: 75px; background: rgba(255, 152, 0, 0.5); }

        #result-screen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; text-align: center; z-index: 1000; }
        #boost-bar { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); color: #ffeb3b; font-size: 22px; font-weight: bold; display: none; text-shadow: 2px 2px 5px #000; z-index: 10; }
    </style>
</head>
<body>
    <div id="start-overlay">
        <h1 style="color: #ffeb3b; font-size: 45px; margin: 0; text-shadow: 4px 4px 0 #000; margin-bottom: 30px;">Goat Kart GP</h1>
        <button id="html-start-btn">START GAME</button>
    </div>

    <div id="countdown">3</div>
    <div id="ui"><div id="rank">Rank: 1/6</div><div id="timer">Time: 0.00s</div><div id="status">ON ROAD</div></div>
    <div id="item-slot"><div style="font-size: 10px;">ITEM</div><div id="item-name" style="font-size: 12px; color: #ffeb3b; text-align: center;">EMPTY</div></div>
    <div id="boost-bar">BIG HORN!!</div>

    <div id="btn-left" class="touch-btn">◀</div><div id="btn-right" class="touch-btn">▶</div><div id="btn-accel" class="touch-btn">GO!</div><div id="btn-item" class="touch-btn">ITEM</div>

    <div id="result-screen">
        <h1 id="result-title">GOAL!</h1>
        <p id="final-rank" style="font-size: 24px; font-weight: bold;"></p>
        <button id="retry-btn" style="padding:15px 30px; font-size:20px; background:#4CAF50; color:#fff; border:none; border-radius:5px;">RETRY</button>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.157.0/build/three.module.js" } }</script>
    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 300, 50);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.7));

        // 4800ロングコース
        const points = [
            new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,400),
            new THREE.Vector3(200,0,1000), new THREE.Vector3(-250,0,1600),
            new THREE.Vector3(300,0,2400), new THREE.Vector3(-100,0,3200),
            new THREE.Vector3(400,0,4000), new THREE.Vector3(0,0,4800)
        ];
        const curve = new THREE.CatmullRomCurve3(points);
        const trackLength = 4800, trackRadius = 22; 
        const trackGeo = new THREE.TubeGeometry(curve, 800, trackRadius, 12, false);
        const track = new THREE.Mesh(trackGeo, new THREE.MeshStandardMaterial({ color: 0x333333 }));
        track.scale.y = 0.01; scene.add(track);

        const grass = new THREE.Mesh(new THREE.PlaneGeometry(15000, 15000), new THREE.MeshStandardMaterial({ color: 0x7cb342 }));
        grass.rotation.x = -Math.PI / 2; scene.add(grass);

        // 街並みと森
        function createTree(x, z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1, 4), new THREE.MeshStandardMaterial({color: 0x5d4037}));
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(3, 7, 8), new THREE.MeshStandardMaterial({color: Math.random() > 0.5 ? 0x2e7d32 : 0x1b5e20}));
            leaves.position.y = 4; tree.add(trunk, leaves); tree.position.set(x, 0, z); scene.add(tree);
        }
        function createHouse(x, z, rot) {
            const house = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 8), new THREE.MeshStandardMaterial({color: 0xf5f5f5}));
            body.position.y = 3;
            const roof = new THREE.Mesh(new THREE.ConeGeometry(7, 4, 4), new THREE.MeshStandardMaterial({color: 0xd32f2f}));
            roof.position.y = 8; roof.rotation.y = Math.PI / 4;
            house.add(body, roof); house.position.set(x, 0, z); house.rotation.y = rot; scene.add(house);
        }
        for (let i = 0; i < 1; i += 0.015) {
            const p = curve.getPointAt(i);
            const sideX = (Math.random() - 0.5) * 200;
            if (Math.abs(sideX) > 40) {
                if (Math.random() > 0.8) createHouse(p.x + sideX, p.z + (Math.random() * 20), Math.random() * Math.PI);
                else createTree(p.x + sideX, p.z + (Math.random() * 20));
            }
        }

        const goalLine = new THREE.Mesh(new THREE.PlaneGeometry(trackRadius * 4, 10), new THREE.MeshStandardMaterial({ color: 0xff3333 }));
        goalLine.rotation.x = -Math.PI / 2; goalLine.position.set(0, 0.05, 4790); scene.add(goalLine);

        // ジャンプ台と障害物
        const obstacles = [];
        const jumpPads = [];
        for(let i=0.06; i<0.95; i+=0.06) {
            const p = curve.getPointAt(i);
            const nextP = curve.getPointAt(i + 0.01);
            const dir = new THREE.Vector3().subVectors(nextP, p).normalize();
            const angle = Math.atan2(dir.x, dir.z);
            
            // ① ジャンプ台モデル
            const jp = new THREE.Mesh(new THREE.BoxGeometry(16, 2, 10), new THREE.MeshStandardMaterial({color: 0xffeb3b}));
            jp.position.set(p.x + 6, 0.5, p.z); jp.rotation.y = angle; jp.rotation.x = -0.3;
            scene.add(jp); jumpPads.push(jp);

            const obsP = curve.getPointAt(i + 0.03);
            let obs;
            if (Math.random() > 0.5) {
                obs = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 5), new THREE.MeshStandardMaterial({color: 0x5d4037}));
                const leaves = new THREE.Mesh(new THREE.SphereGeometry(3.5), new THREE.MeshStandardMaterial({color: 0x2e7d32}));
                leaves.position.y = 4; obs.add(trunk, leaves);
            } else {
                obs = new THREE.Mesh(new THREE.BoxGeometry(5, 3, 7), new THREE.MeshStandardMaterial({color: 0xc62828}));
                obs.rotation.y = angle + Math.PI/2;
            }
            obs.position.set(obsP.x - 6, 1.5, obsP.z);
            scene.add(obs); obstacles.push(obs);
        }

        function createDizzyMark() {
            const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = '#ffeb3b'; ctx.font = '50px Arial';
            ctx.textAlign = 'center'; ctx.fillText('@', 32, 50);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            sprite.scale.set(3, 3, 1); sprite.position.y = 4; sprite.visible = false; return sprite;
        }
        function createGoat(color) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.9, 1.8), new THREE.MeshStandardMaterial({color})); body.position.y = 0.45;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({color})); head.position.set(0, 1.15, 0.8);
            const dizzy = createDizzyMark(); g.add(body, head, dizzy); g.userData = { dizzy }; return g;
        }

        const player = createGoat(0xffffff);
        const bigHorn = new THREE.Group();
        const h1 = new THREE.Mesh(new THREE.ConeGeometry(0.4, 3, 8), new THREE.MeshStandardMaterial({color: 0xffd700}));
        h1.rotation.x = Math.PI / 2.5; h1.position.set(0.3, 1.5, 1.5);
        const h2 = h1.clone(); h2.position.x = -0.3; bigHorn.add(h1, h2); bigHorn.visible = false;
        player.add(bigHorn); scene.add(player);

        // --- ③ CPUを5台（全員集合）に変更 ---
        // --- ④ スピードの均一化 (全員一律 0.00017) ---
        const baseCpuSpeed = 0.00017;
        const cpuStats = [
            {n:"C1", c:0xffaaaa, o:-12}, {n:"C2", c:0xaaaaff, o:12}, 
            {n:"C3", c:0xffe082, o:-6},  {n:"C4", c:0xce93d8, o:6}, 
            {n:"C5", c:0x80cbc4, o:0}
        ].map(d => {
            const obj = createGoat(d.c); scene.add(obj);
            return { obj, name: d.n, t: 0, speed: baseCpuSpeed, offset: d.o, stun: 0, item: null };
        });

        const boxes = [];
        for(let i=0.03; i<0.98; i+=0.04) {
            const p = curve.getPointAt(i);
            for(let j=0; j<2; j++) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(3.5, 3.5, 3.5), new THREE.MeshStandardMaterial({color: 0xff00ff, transparent:true, opacity:0.6}));
                b.position.set(p.x + (j === 0 ? -12 : 12), 2, p.z); scene.add(b); boxes.push(b);
            }
        }

        let isReady = false, isStarted = false, isFinished = false, playerItem = null, velocity = 0, angle = 0, startTime = null;
        let hornTimer = 0, jumpY = 0, jumpVelocity = 0, playerStun = 0;
        const keys = {}; const touch = { left: false, right: false, accel: false };
        let activeHorns = [], activePlanes = [];

        function getRandomItem() {
            const r = Math.random();
            if (r < 0.01) return 'TAKEO';
            if (r < 0.11) return 'PLANE';
            if (r < 0.26) return 'BIGHORN';
            return Math.random() > 0.5 ? 'HORN' : 'MUSHROOM';
        }

        function useItem(owner, type) {
            const all = [{obj:player, z:player.position.z}, ...cpuStats.map(c=>({obj:c.obj, z:c.obj.position.z}))].sort((a,b)=>b.z-a.z);
            const leader = all[0];

            if (type === 'BIGHORN') { 
                if (owner === player) { hornTimer = 300; bigHorn.visible = true; document.getElementById('boost-bar').style.display = 'block'; } 
            } else if (type === 'HORN') {
                let target = null;
                if (owner === player) cpuStats.forEach(c => { if (c.obj.position.z > player.position.z) target = c.obj; });
                else if (player.position.z > owner.position.z) target = player;
                if(target) spawnHorn(owner, target);
            } else if (type === 'MUSHROOM') { 
                if (owner === player) velocity += 1.6; 
                else { const stat = cpuStats.find(s => s.obj === owner); if(stat) stat.t += 0.01; }
            } else if (type === 'PLANE') { 
                spawnPlane(owner, leader.obj); 
            } else if (type === 'TAKEO') {
                const targetT = Math.max(0, leader.obj.position.z / trackLength - 0.005);
                if (owner === player) { const p = curve.getPointAt(targetT); player.position.set(p.x, 0, p.z); velocity = 0.5; }
                else { const stat = cpuStats.find(s => s.obj === owner); if(stat) stat.t = targetT; }
            }
        }

        function spawnHorn(owner, target) {
            const horn = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.8, 8), new THREE.MeshStandardMaterial({color: 0xffeb3b}));
            horn.position.copy(owner.position).y += 1.5; scene.add(horn); activeHorns.push({ obj: horn, target, life: 240 });
        }
        function spawnPlane(owner, target) {
            const plane = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 2), new THREE.MeshStandardMaterial({color: 0x2196F3}));
            plane.position.copy(owner.position).y += 5; scene.add(plane); activePlanes.push({ obj: plane, target, life: 400 });
        }

        function startRaceCountdown() {
            if (isReady) return; isReady = true;
            document.getElementById('start-overlay').style.display = 'none';
            const countEl = document.getElementById('countdown'); countEl.style.display = 'block';
            document.getElementById('ui').style.opacity = "1"; document.getElementById('item-slot').style.opacity = "1";
            document.querySelectorAll('.touch-btn').forEach(b => b.style.display = "flex");

            let counts = ["3", "2", "1", "GO!"], idx = 0;
            const timer = setInterval(() => {
                if (idx < counts.length) { countEl.innerText = counts[idx]; idx++; } 
                else { countEl.style.display = 'none'; isStarted = true; startTime = Date.now(); clearInterval(timer); }
            }, 700);
        }

        const realBtn = document.getElementById('html-start-btn');
        realBtn.addEventListener('click', (e) => { e.stopPropagation(); startRaceCountdown(); });
        realBtn.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); startRaceCountdown(); }, {passive: false});

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (!isReady) startRaceCountdown();
                else if (isStarted && playerItem && !isFinished) { useItem(player, playerItem); playerItem = null; document.getElementById('item-name').innerText = "EMPTY"; }
            }
            keys[e.code] = true;
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        const setupBtn = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (key === 'item') {
                    if (isStarted && playerItem) { useItem(player, playerItem); playerItem = null; document.getElementById('item-name').innerText = "EMPTY"; }
                } else { touch[key] = true; }
            }, {passive: false});
            el.addEventListener('touchend', (e) => { touch[key] = false; }, {passive: false});
        };
        setupBtn('btn-left', 'left'); setupBtn('btn-right', 'right'); setupBtn('btn-accel', 'accel'); setupBtn('btn-item', 'item');
        
        const retryBtn = document.getElementById('retry-btn');
        retryBtn.addEventListener('click', () => location.reload());
        retryBtn.addEventListener('touchstart', (e) => { e.preventDefault(); location.reload(); });

        function animate() {
            requestAnimationFrame(animate);
            if (!isStarted || isFinished) {
                if (!isStarted) {
                    camera.position.set(player.position.x - Math.sin(angle)*15, 8, player.position.z - Math.cos(angle)*15);
                    camera.lookAt(player.position.x, 2, player.position.z);
                }
                renderer.render(scene, camera); return;
            }

            // プレイヤー挙動
            if(playerStun > 0) { 
                playerStun--; velocity *= 0.8; player.rotation.y += 0.3;
                player.userData.dizzy.visible = true; player.userData.dizzy.rotation.z += 0.1;
            } else {
                player.userData.dizzy.visible = false;
                
                // --- ④ プレイヤーの最高速度制限 (CPUと同じ0.81に調整) ---
                let accel = 0.04; 
                let friction = 0.95; 

                // --- ② オフロード（芝生）減速処理の復活 ---
                let minPlayerDist = Infinity;
                const currentT = Math.min(Math.max(player.position.z / trackLength, 0), 1);
                for (let i = -0.05; i <= 0.05; i += 0.005) {
                    const t = Math.min(Math.max(currentT + i, 0), 1);
                    const p = curve.getPointAt(t);
                    const d = new THREE.Vector2(player.position.x, player.position.z).distanceTo(new THREE.Vector2(p.x, p.z));
                    if (d < minPlayerDist) minPlayerDist = d;
                }
                
                if (minPlayerDist > trackRadius + 2) { 
                    friction = 0.75; // オフロード時は強烈に摩擦がかかる（減速）
                    document.getElementById('status').innerText = "🍀 OFF ROAD"; document.getElementById('status').style.color = "#ff3333";
                } else {
                    document.getElementById('status').innerText = "🏎️ ON ROAD"; document.getElementById('status').style.color = "#00ff00";
                }

                if (keys['KeyW'] || keys['ArrowUp'] || touch.accel) velocity += accel; 
                if (Math.abs(velocity) > 0.005) {
                    if (keys['KeyA'] || keys['ArrowLeft'] || touch.left) angle += 0.052;
                    if (keys['KeyD'] || keys['ArrowRight'] || touch.right) angle -= 0.052;
                }
                velocity *= friction; player.rotation.y = angle;
            }

            if (hornTimer > 0) { hornTimer--; if(hornTimer <= 0) { bigHorn.visible = false; document.getElementById('boost-bar').style.display = 'none'; } }
            
            jumpY += jumpVelocity; if(jumpY > 0) jumpVelocity -= 0.015; else { jumpY = 0; jumpVelocity = 0; }
            player.position.y = jumpY;

            // ① ジャンプ台の判定強化（すり抜け対策）
            jumpPads.forEach(j => { 
                const dx = Math.abs(player.position.x - j.position.x);
                const dz = Math.abs(player.position.z - j.position.z);
                if(dx < 10 && dz < 6 && jumpY <= 0.5) { 
                    jumpVelocity = 0.6; // 空中へ
                    velocity = 1.8;     // 前方への推進力（大ブースト）
                } 
            });
            
            // プレイヤー障害物衝突判定（2秒回転）
            obstacles.forEach((o, i) => {
                if(playerStun <= 0 && player.position.distanceTo(o.position) < 5.5 && jumpY < 2) {
                    if (hornTimer > 0) { scene.remove(o); obstacles.splice(i, 1); } 
                    else { velocity *= -0.5; playerStun = 120; const push = new THREE.Vector3().subVectors(player.position, o.position).normalize(); player.position.add(push.multiplyScalar(3)); }
                }
            });

            player.position.x += Math.sin(angle) * velocity;
            player.position.z += Math.cos(angle) * velocity;

            // CPU移動 ＆ 障害物衝突判定（2秒回転）
            cpuStats.forEach(c => {
                if (c.stun > 0) { c.obj.rotation.y += 0.3; c.stun--; c.obj.userData.dizzy.visible = true; c.obj.userData.dizzy.rotation.z += 0.1; return; }
                c.obj.userData.dizzy.visible = false; c.t += c.speed;
                const p = curve.getPointAt(Math.min(c.t, 1));
                const nextPos = new THREE.Vector3(p.x + c.offset, 0, p.z);
                let collided = false;
                obstacles.forEach(o => { if (nextPos.distanceTo(o.position) < 5) { collided = true; c.stun = 120; } });
                if (!collided) {
                    c.obj.position.copy(nextPos);
                    const lookAtP = curve.getPointAt(Math.min(c.t + 0.01, 1));
                    c.obj.lookAt(lookAtP.x + c.offset, 0, lookAtP.z);
                }
                boxes.forEach(b => { if (b.visible && c.obj.position.distanceTo(b.position) < 8) { b.visible = false; c.item = getRandomItem(); setTimeout(() => b.visible = true, 100); } });
                if (c.item && Math.random() < 0.005) { useItem(c.obj, c.item); c.item = null; }
            });

            // ホーミングツノ
            activeHorns.forEach((h, index) => {
                const dir = new THREE.Vector3().subVectors(h.target.position, h.obj.position).normalize();
                h.obj.position.add(dir.multiplyScalar(3.0));
                if (h.obj.position.distanceTo(h.target.position) < 3) {
                    if (h.target === player) { velocity = 0; playerStun = 120; }
                    const stat = cpuStats.find(s => s.obj === h.target); if (stat) stat.stun = 120;
                    scene.remove(h.obj); activeHorns.splice(index, 1);
                }
                h.life--; if (h.life <= 0) { scene.remove(h.obj); activeHorns.splice(index, 1); }
            });

            // 飛行機
            activePlanes.forEach((p, index) => {
                const dir = new THREE.Vector3().subVectors(p.target.position, p.obj.position).normalize();
                p.obj.position.add(dir.multiplyScalar(2.5)); p.obj.lookAt(p.target.position);
                if (p.obj.position.distanceTo(p.target.position) < 4) {
                    if (p.target === player) { velocity = 0; playerStun = 180; }
                    const stat = cpuStats.find(s => s.obj === p.target); if (stat) stat.stun = 180;
                    scene.remove(p.obj); activePlanes.splice(index, 1);
                }
                p.life--; if (p.life <= 0) { scene.remove(p.obj); activePlanes.splice(index, 1); }
            });

            // アイテム回収
            boxes.forEach(b => { if (b.visible && player.position.distanceTo(b.position) < 8) { b.visible = false; playerItem = getRandomItem();
                const names = {'HORN':'角','MUSHROOM':'キノコ','BIGHORN':'でかいツノ','PLANE':'飛行機','TAKEO':'タケコプター'};
                document.getElementById('item-name').innerText = names[playerItem]; setTimeout(() => b.visible = true, 100); } });

            const allGoats = [{n:'You', z:player.position.z}, ...cpuStats.map(c=>({n:c.name, z:c.obj.position.z}))].sort((a,b)=>b.z-a.z);
            const myRank = allGoats.findIndex(r=>r.n==='You')+1;
            document.getElementById('rank').innerText = `Rank: ${myRank}/6`;
            if (player.position.z > 4780) { isFinished = true; document.getElementById('final-rank').innerText = `${myRank}位！`; document.getElementById('result-screen').style.display = 'block'; }

            camera.position.set(player.position.x - Math.sin(angle)*15, 8 + jumpY, player.position.z - Math.cos(angle)*15);
            camera.lookAt(player.position.x, 2 + jumpY, player.position.z);
            document.getElementById('timer').innerText = `Time: ${((Date.now()-startTime)/1000).toFixed(2)}s`;
            renderer.render(scene, camera);
        }
        animate();
        player.position.set(0,0,0);
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
