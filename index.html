<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Goat Kart GP - Item Balance Update</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Arial Black', sans-serif; }
        #start-screen {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        .flash { color: #fff; font-size: 40px; text-shadow: 0 0 15px #ffeb3b; animation: blink 0.8s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; z-index: 10; }
        #item-slot { position: absolute; top: 20px; right: 20px; width: 120px; height: 120px; background: rgba(0,0,0,0.5); border: 4px solid #fff; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 10; }
        #result-screen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 20px; text-align: center; z-index: 200; }
        button { padding: 12px 24px; font-size: 18px; cursor: pointer; margin-top: 20px; background: #4CAF50; color: white; border: none; border-radius: 5px; }
        #boost-bar { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); color: #ffeb3b; font-size: 24px; font-weight: bold; display: none; text-shadow: 2px 2px 5px #000; }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1 style="color: #ffeb3b; font-size: 80px; margin: 0; text-shadow: 4px 4px 0 #000;">Goat Kart GP</h1>
        <p class="flash">PRESS [SPACE] TO START</p>
    </div>

    <div id="ui">
        <div id="rank" style="font-size: 24px;">Rank: 1/6</div>
        <div id="timer">Time: 0.00s</div>
        <div id="status" style="font-size: 14px;">ON ROAD</div>
    </div>

    <div id="item-slot">
        <div style="font-size: 12px;">ITEM</div>
        <div id="item-name" style="font-size: 18px; color: #ffeb3b; text-align: center;">EMPTY</div>
    </div>

    <div id="boost-bar">SHEPHERD BOOST!!</div>

    <div id="result-screen">
        <h1 id="result-title">GOAL!</h1>
        <p id="final-rank" style="font-size: 30px; font-weight: bold;"></p>
        <button onclick="location.reload()">ホームへ戻る</button>
    </div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.157.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 8000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 300, 50);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.7));

        const points = [
            new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,400),
            new THREE.Vector3(200,0,1000), new THREE.Vector3(-250,0,1600),
            new THREE.Vector3(300,0,2400), new THREE.Vector3(-100,0,3200),
            new THREE.Vector3(400,0,4000), new THREE.Vector3(0,0,4800)
        ];
        const curve = new THREE.CatmullRomCurve3(points);
        const trackLength = 4800;
        const trackRadius = 22; 
        const trackGeo = new THREE.TubeGeometry(curve, 800, trackRadius, 12, false);
        const track = new THREE.Mesh(trackGeo, new THREE.MeshStandardMaterial({ color: 0x333333 }));
        track.scale.y = 0.01; scene.add(track);

        const grass = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshStandardMaterial({ color: 0x7cb342 }));
        grass.rotation.x = -Math.PI / 2; scene.add(grass);

        const goalLine = new THREE.Mesh(new THREE.PlaneGeometry(trackRadius * 4, 10), new THREE.MeshStandardMaterial({ color: 0xff3333 }));
        goalLine.rotation.x = -Math.PI / 2; goalLine.position.set(0, 0.05, 4790);
        scene.add(goalLine);

        const jumpPads = [];
        const obstacles = [];
        for(let i=0.1; i<0.95; i+=0.15) {
            const jp = new THREE.Mesh(new THREE.BoxGeometry(15, 1, 10), new THREE.MeshStandardMaterial({color: 0xffeb3b}));
            const pos = curve.getPointAt(i);
            jp.position.set(pos.x + 5, 0.5, pos.z); jp.rotation.x = -0.3;
            scene.add(jp); jumpPads.push(jp);

            const obs = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 4, 8), new THREE.MeshStandardMaterial({color: 0xff3333}));
            const posObs = curve.getPointAt(i + 0.05);
            obs.position.set(posObs.x - 5, 2, posObs.z);
            scene.add(obs); obstacles.push(obs);
        }

        function createGoat(color) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.9, 1.8), new THREE.MeshStandardMaterial({color}));
            body.position.y = 0.45;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({color}));
            head.position.set(0, 1.15, 0.8);
            g.add(body, head);
            return g;
        }

        const player = createGoat(0xffffff);
        const shepherd = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.4), new THREE.MeshStandardMaterial({color: 0x8b4513}));
        shepherd.position.y = 1.3; shepherd.visible = false;
        player.add(shepherd);
        scene.add(player);

        const cpuData = [{ name: "CPU1", color: 0xffaaaa, offset: -14 }, { name: "CPU2", color: 0xaaaaff, offset: 14 }, { name: "CPU3", color: 0xffe082, offset: -7 }, { name: "CPU4", color: 0xce93d8, offset: 7 }, { name: "CPU5", color: 0x80cbc4, offset: 0 }];
        const cpuStats = cpuData.map(data => {
            const obj = createGoat(data.color);
            scene.add(obj);
            return { obj, name: data.name, t: 0, speed: 0.00015 + Math.random() * 0.0001, offset: data.offset, stun: 0, item: null };
        });

        const boxes = [];
        for(let i=0.03; i<0.98; i+=0.04) {
            const p = curve.getPointAt(i);
            const numInRow = Math.random() > 0.5 ? 3 : 2;
            for(let j=0; j<numInRow; j++) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), new THREE.MeshStandardMaterial({color: 0xff00ff, transparent:true, opacity:0.6}));
                const offsetX = (j - (numInRow-1)/2) * 12;
                b.position.set(p.x + offsetX, 2, p.z);
                scene.add(b); boxes.push(b);
            }
        }

        let isStarted = false, isFinished = false, playerItem = null, velocity = 0, angle = 0, startTime = null;
        let boostTimer = 0, jumpY = 0, jumpVelocity = 0, playerStun = 0;
        const keys = {};
        let activeHorns = [], activePlanes = [];

        function getRandomItem() {
            const r = Math.random();
            if (r < 0.01) return 'TAKEO';  // 1%
            if (r < 0.11) return 'PLANE';  // 10% (0.01 ~ 0.11 の範囲)
            const remain = ['HORN', 'MUSHROOM', 'SHEPHERD'];
            return remain[Math.floor(Math.random() * remain.length)];
        }

        function useItem(owner, type) {
            const all = [{obj:player, z:player.position.z, stat:null}, ...cpuStats.map(c=>({obj:c.obj, z:c.obj.position.z, stat:c}))].sort((a,b)=>b.z-a.z);
            const leader = all[0];

            if (type === 'HORN') {
                let target = null;
                if (owner === player) {
                    let minDist = Infinity;
                    cpuStats.forEach(c => { if (c.obj.position.z > player.position.z) { let d = player.position.distanceTo(c.obj.position); if (d < minDist) { minDist = d; target = c.obj; } } });
                } else if (player.position.z > owner.position.z) { target = player; }
                if(target) spawnHorn(owner, target);
            } else if (type === 'MUSHROOM') {
                if (owner === player) velocity += 1.3;
                else { const stat = cpuStats.find(s => s.obj === owner); if(stat) stat.t += 0.01; }
            } else if (type === 'SHEPHERD') {
                if (owner === player) { boostTimer = 120; shepherd.visible = true; document.getElementById('boost-bar').style.display = 'block'; }
                else { const stat = cpuStats.find(s => s.obj === owner); if(stat) { stat.speed *= 1.25; setTimeout(() => { if(stat) stat.speed /= 1.25; }, 2000); } }
            } else if (type === 'PLANE') {
                spawnPlane(owner, leader.obj);
            } else if (type === 'TAKEO') {
                if (owner === player) {
                    const targetT = Math.max(0, leader.obj.position.z / trackLength - 0.005);
                    const p = curve.getPointAt(targetT);
                    player.position.set(p.x, 0, p.z); velocity = 0.5;
                } else {
                    const stat = cpuStats.find(s => s.obj === owner);
                    if(stat) stat.t = Math.max(0, leader.obj.position.z / trackLength - 0.005);
                }
            }
        }

        function spawnHorn(owner, target) {
            const horn = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.8, 8), new THREE.MeshStandardMaterial({color: 0xffeb3b}));
            horn.position.copy(owner.position).y += 1.5;
            scene.add(horn); activeHorns.push({ obj: horn, target, life: 240 });
        }

        function spawnPlane(owner, target) {
            const plane = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 2), new THREE.MeshStandardMaterial({color: 0x2196F3}));
            plane.position.copy(owner.position).y += 5;
            scene.add(plane); activePlanes.push({ obj: plane, target, life: 400 });
        }

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') {
                if (!isStarted) { isStarted = true; startTime = Date.now(); document.getElementById('start-screen').style.display = 'none'; }
                else if (playerItem && !isFinished) {
                    useItem(player, playerItem); playerItem = null; document.getElementById('item-name').innerText = "EMPTY";
                }
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            if (!isStarted || isFinished) { renderer.render(scene, camera); return; }

            if(playerStun > 0) { playerStun--; velocity *= 0.5; } 
            else {
                let accel = 0.04; let friction = 0.97;
                if (boostTimer > 0) { accel *= 1.25; friction = 0.98; boostTimer--; if(boostTimer <= 0){ shepherd.visible = false; document.getElementById('boost-bar').style.display = 'none'; } }
                if (keys['KeyW'] || keys['ArrowUp']) velocity += accel; 
                if (keys['KeyS'] || keys['ArrowDown']) velocity -= accel;
                if (Math.abs(velocity) > 0.005) { if (keys['KeyA'] || keys['ArrowLeft']) angle += 0.052; if (keys['KeyD'] || keys['ArrowRight']) angle -= 0.052; }
                velocity *= friction;
            }

            jumpY += jumpVelocity; if(jumpY > 0) { jumpVelocity -= 0.015; } else { jumpY = 0; jumpVelocity = 0; }
            player.position.y = jumpY;

            jumpPads.forEach(j => { if(player.position.distanceTo(j.position) < 8 && jumpY <= 0) { jumpVelocity = 0.5; velocity += 0.5; } });
            obstacles.forEach(o => { if(player.position.distanceTo(o.position) < 4 && jumpY < 1) { velocity = 0; playerStun = 30; } });

            let minPlayerDist = Infinity;
            const currentT = Math.min(Math.max(player.position.z / trackLength, 0), 1);
            for (let i = -0.05; i <= 0.05; i += 0.005) {
                const t = Math.min(Math.max(currentT + i, 0), 1);
                const p = curve.getPointAt(t);
                const d = new THREE.Vector2(player.position.x, player.position.z).distanceTo(new THREE.Vector2(p.x, p.z));
                if (d < minPlayerDist) minPlayerDist = d;
            }
            if (minPlayerDist > trackRadius + 2) { velocity *= 0.82; document.getElementById('status').innerText = "🍀 OFF ROAD"; document.getElementById('status').style.color = "#ff3333"; }
            else { document.getElementById('status').innerText = "🏎️ ON ROAD"; document.getElementById('status').style.color = "#00ff00"; }

            player.rotation.y = angle;
            player.position.x += Math.sin(angle) * velocity;
            player.position.z += Math.cos(angle) * velocity;

            cpuStats.forEach(c => {
                if (c.stun > 0) { c.obj.rotation.y += 0.5; c.stun--; return; }
                c.t += c.speed;
                const p = curve.getPointAt(Math.min(c.t, 1));
                c.obj.position.set(p.x + c.offset, 0, p.z);
                c.obj.lookAt(curve.getPointAt(Math.min(c.t + 0.01, 1)).x + c.offset, 0, curve.getPointAt(Math.min(c.t + 0.01, 1)).z);
                boxes.forEach(b => { if (b.visible && c.obj.position.distanceTo(b.position) < 8) { b.visible = false; c.item = getRandomItem(); setTimeout(() => b.visible = true, 4000); } });
                if (c.item && Math.random() < 0.005) { useItem(c.obj, c.item); c.item = null; }
            });

            activeHorns.forEach((h, index) => {
                const dir = new THREE.Vector3().subVectors(h.target.position, h.obj.position).normalize();
                h.obj.position.add(dir.multiplyScalar(3.0));
                if (h.obj.position.distanceTo(h.target.position) < 3) {
                    if (h.target === player) { velocity = 0; playerStun = 60; }
                    const stat = cpuStats.find(s => s.obj === h.target); if (stat) stat.stun = 60;
                    scene.remove(h.obj); activeHorns.splice(index, 1);
                }
                h.life--; if (h.life <= 0) { scene.remove(h.obj); activeHorns.splice(index, 1); }
            });

            activePlanes.forEach((p, index) => {
                const dir = new THREE.Vector3().subVectors(p.target.position, p.obj.position).normalize();
                p.obj.position.add(dir.multiplyScalar(2.0));
                p.obj.lookAt(p.target.position);
                if (p.obj.position.distanceTo(p.target.position) < 4) {
                    if (p.target === player) { velocity = 0; playerStun = 120; }
                    const stat = cpuStats.find(s => s.obj === p.target); if (stat) stat.stun = 120;
                    scene.remove(p.obj); activePlanes.splice(index, 1);
                }
                p.life--; if (p.life <= 0) { scene.remove(p.obj); activePlanes.splice(index, 1); }
            });

            boxes.forEach(b => { if (b.visible && player.position.distanceTo(b.position) < 8) { b.visible = false; playerItem = getRandomItem();
                const names = {'HORN':'角','MUSHROOM':'キノコ','SHEPHERD':'羊飼い','PLANE':'飛行機','TAKEO':'タケコプター'};
                document.getElementById('item-name').innerText = names[playerItem]; setTimeout(() => b.visible = true, 4000); } });

            const allGoats = [{n:'You', z:player.position.z}, ...cpuStats.map(c=>({n:c.name, z:c.obj.position.z}))].sort((a,b)=>b.z-a.z);
            const myRank = allGoats.findIndex(r=>r.n==='You')+1;
            document.getElementById('rank').innerText = `Rank: ${myRank}/6`;

            if (player.position.z > 4780) { isFinished = true; document.getElementById('final-rank').innerText = `${myRank}位！`; document.getElementById('result-screen').style.display = 'block'; }

            camera.position.set(player.position.x - Math.sin(angle)*15, 8 + jumpY, player.position.z - Math.cos(angle)*15);
            camera.lookAt(player.position.x, 2 + jumpY, player.position.z);
            document.getElementById('timer').innerText = `Time: ${((Date.now()-startTime)/1000).toFixed(2)}s`;
            renderer.render(scene, camera);
        }
        animate();
        player.position.set(0,0,0);
    </script>
</body>
</html>
