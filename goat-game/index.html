<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goat Kart GP - Mobile Ready</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Arial Black', sans-serif; touch-action: none; -webkit-user-select: none; }
        #start-screen {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        #countdown {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 120px; color: #fff; text-shadow: 0 0 20px #f00; z-index: 150; display: none;
        }
        .flash { color: #fff; font-size: 30px; text-shadow: 0 0 10px #ffeb3b; animation: blink 0.8s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }
        
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; z-index: 10; font-size: 14px; pointer-events: none; }
        #item-slot { position: absolute; top: 10px; right: 10px; width: 80px; height: 80px; background: rgba(0,0,0,0.5); border: 3px solid #fff; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 10; pointer-events: none; }
        
        /* スマホ用コントローラー */
        .touch-btn { position: absolute; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; user-select: none; z-index: 50; }
        #btn-left { bottom: 40px; left: 30px; width: 80px; height: 80px; }
        #btn-right { bottom: 40px; left: 130px; width: 80px; height: 80px; }
        #btn-accel { bottom: 40px; right: 30px; width: 100px; height: 100px; background: rgba(76, 175, 80, 0.4); }
        #btn-item { bottom: 160px; right: 30px; width: 70px; height: 70px; background: rgba(255, 152, 0, 0.4); }

        #result-screen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; text-align: center; z-index: 200; }
        button { padding: 12px 24px; font-size: 18px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 5px; }
        #boost-bar { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); color: #ffeb3b; font-size: 20px; font-weight: bold; display: none; text-shadow: 2px 2px 5px #000; z-index: 10; }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1 style="color: #ffeb3b; font-size: 50px; margin: 0; text-shadow: 3px 3px 0 #000;">Goat Kart GP</h1>
        <p class="flash">TOUCH or SPACE to START</p>
    </div>

    <div id="countdown">3</div>

    <div id="ui">
        <div id="rank">Rank: 1/6</div>
        <div id="timer">Time: 0.00s</div>
        <div id="status">ON ROAD</div>
    </div>

    <div id="item-slot">
        <div style="font-size: 10px;">ITEM</div>
        <div id="item-name" style="font-size: 14px; color: #ffeb3b; text-align: center;">EMPTY</div>
    </div>

    <div id="boost-bar">SHEPHERD BOOST!!</div>

    <div id="btn-left" class="touch-btn">◀</div>
    <div id="btn-right" class="touch-btn">▶</div>
    <div id="btn-accel" class="touch-btn">GO!</div>
    <div id="btn-item" class="touch-btn">ITEM</div>

    <div id="result-screen">
        <h1 id="result-title">GOAL!</h1>
        <p id="final-rank" style="font-size: 24px; font-weight: bold;"></p>
        <button onclick="location.reload()">RETRY</button>
    </div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.157.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 8000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 300, 50);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.7));

        const points = [
            new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,400),
            new THREE.Vector3(200,0,1000), new THREE.Vector3(-250,0,1600),
            new THREE.Vector3(300,0,2400), new THREE.Vector3(-100,0,3200),
            new THREE.Vector3(400,0,4000), new THREE.Vector3(0,0,4800)
        ];
        const curve = new THREE.CatmullRomCurve3(points);
        const trackLength = 4800;
        const trackRadius = 22; 
        const trackGeo = new THREE.TubeGeometry(curve, 800, trackRadius, 12, false);
        const track = new THREE.Mesh(trackGeo, new THREE.MeshStandardMaterial({ color: 0x333333 }));
        track.scale.y = 0.01; scene.add(track);

        const grass = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshStandardMaterial({ color: 0x7cb342 }));
        grass.rotation.x = -Math.PI / 2; scene.add(grass);

        const goalLine = new THREE.Mesh(new THREE.PlaneGeometry(trackRadius * 4, 10), new THREE.MeshStandardMaterial({ color: 0xff3333 }));
        goalLine.rotation.x = -Math.PI / 2; goalLine.position.set(0, 0.05, 4790);
        scene.add(goalLine);

        const jumpPads = [];
        const obstacles = [];
        for(let i=0.08; i<0.95; i+=0.12) {
            const p = curve.getPointAt(i);
            const nextP = curve.getPointAt(i + 0.01);
            const dir = new THREE.Vector3().subVectors(nextP, p).normalize();
            const angle = Math.atan2(dir.x, dir.z);
            const jp = new THREE.Mesh(new THREE.BoxGeometry(18, 2, 12), new THREE.MeshStandardMaterial({color: 0xffeb3b}));
            jp.position.set(p.x + 8, 0, p.z); jp.rotation.y = angle; jp.rotation.x = -0.3;
            scene.add(jp); jumpPads.push(jp);
            const obsP = curve.getPointAt(i + 0.06);
            const obs = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 2.5, 5, 12), new THREE.MeshStandardMaterial({color: 0xff3333}));
            obs.position.set(obsP.x - 8, 2.5, obsP.z);
            scene.add(obs); obstacles.push(obs);
        }

        function createGoat(color) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.9, 1.8), new THREE.MeshStandardMaterial({color}));
            body.position.y = 0.45;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({color}));
            head.position.set(0, 1.15, 0.8);
            g.add(body, head);
            return g;
        }

        const player = createGoat(0xffffff);
        const shepherd = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.4), new THREE.MeshStandardMaterial({color: 0x8b4513}));
        shepherd.position.y = 1.3; shepherd.visible = false;
        player.add(shepherd); scene.add(player);

        const cpuData = [{ name: "C1", color: 0xffaaaa, offset: -14 }, { name: "C2", color: 0xaaaaff, offset: 14 }, { name: "C3", color: 0xffe082, offset: -7 }, { name: "C4", color: 0xce93d8, offset: 7 }, { name: "C5", color: 0x80cbc4, offset: 0 }];
        const cpuStats = cpuData.map(data => {
            const obj = createGoat(data.color);
            scene.add(obj);
            return { obj, name: data.name, t: 0, speed: 0.00015 + Math.random() * 0.0001, offset: data.offset, stun: 0, item: null };
        });

        const boxes = [];
        for(let i=0.03; i<0.98; i+=0.04) {
            const p = curve.getPointAt(i);
            for(let j=0; j<2; j++) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(3.5, 3.5, 3.5), new THREE.MeshStandardMaterial({color: 0xff00ff, transparent:true, opacity:0.6}));
                b.position.set(p.x + (j === 0 ? -10 : 10), 2, p.z);
                scene.add(b); boxes.push(b);
            }
        }

        let isReady = false, isStarted = false, isFinished = false, playerItem = null, velocity = 0, angle = 0, startTime = null;
        let boostTimer = 0, jumpY = 0, jumpVelocity = 0, playerStun = 0;
        const keys = {};
        let activeHorns = [], activePlanes = [];

        // スマホ操作用フラグ
        const touch = { left: false, right: false, accel: false };

        function getRandomItem() {
            const r = Math.random();
            if (r < 0.01) return 'TAKEO';
            if (r < 0.11) return 'PLANE';
            const remain = ['HORN', 'MUSHROOM', 'SHEPHERD'];
            return remain[Math.floor(Math.random() * remain.length)];
        }

        function useItem(owner, type) {
            const all = [{obj:player, z:player.position.z, stat:null}, ...cpuStats.map(c=>({obj:c.obj, z:c.obj.position.z, stat:c}))].sort((a,b)=>b.z-a.z);
            const leader = all[0];
            if (type === 'HORN') {
                let target = null;
                if (owner === player) { cpuStats.forEach(c => { if (c.obj.position.z > player.position.z) { target = c.obj; } }); } 
                else if (player.position.z > owner.position.z) { target = player; }
                if(target) spawnHorn(owner, target);
            } else if (type === 'MUSHROOM') {
                if (owner === player) velocity += 1.3;
                else { const stat = cpuStats.find(s => s.obj === owner); if(stat) stat.t += 0.01; }
            } else if (type === 'SHEPHERD') {
                if (owner === player) { boostTimer = 120; shepherd.visible = true; document.getElementById('boost-bar').style.display = 'block'; }
                else { const stat = cpuStats.find(s => s.obj === owner); if(stat) { stat.speed *= 1.25; setTimeout(() => { if(stat) stat.speed /= 1.25; }, 2000); } }
            } else if (type === 'PLANE') { spawnPlane(owner, leader.obj); }
            else if (type === 'TAKEO') {
                if (owner === player) {
                    const targetT = Math.max(0, leader.obj.position.z / trackLength - 0.005);
                    const p = curve.getPointAt(targetT);
                    player.position.set(p.x, 0, p.z); velocity = 0.5;
                } else {
                    const stat = cpuStats.find(s => s.obj === owner);
                    if(stat) stat.t = Math.max(0, leader.obj.position.z / trackLength - 0.005);
                }
            }
        }

        function spawnHorn(owner, target) {
            const horn = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.8, 8), new THREE.MeshStandardMaterial({color: 0xffeb3b}));
            horn.position.copy(owner.position).y += 1.5;
            scene.add(horn); activeHorns.push({ obj: horn, target, life: 240 });
        }

        function spawnPlane(owner, target) {
            const plane = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 2), new THREE.MeshStandardMaterial({color: 0x2196F3}));
            plane.position.copy(owner.position).y += 5;
            scene.add(plane); activePlanes.push({ obj: plane, target, life: 400 });
        }

        // ① カウントダウン & スタート
        function startRaceCountdown() {
            if (isReady) return;
            isReady = true;
            document.getElementById('start-screen').style.display = 'none';
            const countEl = document.getElementById('countdown');
            countEl.style.display = 'block';
            
            let counts = ["3", "2", "1", "GO!"];
            let idx = 0;
            const timer = setInterval(() => {
                if (idx < counts.length) {
                    countEl.innerText = counts[idx];
                    idx++;
                } else {
                    countEl.style.display = 'none';
                    isStarted = true;
                    startTime = Date.now();
                    clearInterval(timer);
                }
            }, 1000);
        }

        // 入力イベント
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') {
                if (!isReady) startRaceCountdown();
                else if (isStarted && playerItem && !isFinished) {
                    useItem(player, playerItem); playerItem = null;
                    document.getElementById('item-name').innerText = "EMPTY";
                }
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // ② スマホタッチイベント
        const addTouch = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                if (!isReady) startRaceCountdown();
                else if (key === 'item' && isStarted && playerItem) {
                    useItem(player, playerItem); playerItem = null;
                    document.getElementById('item-name').innerText = "EMPTY";
                } else { touch[key] = true; }
            });
            el.addEventListener('touchend', (e) => { e.preventDefault(); touch[key] = false; });
        };
        addTouch('btn-left', 'left');
        addTouch('btn-right', 'right');
        addTouch('btn-accel', 'accel');
        addTouch('btn-item', 'item');

        function animate() {
            requestAnimationFrame(animate);
            if (!isReady) { renderer.render(scene, camera); return; }
            if (!isStarted || isFinished) { 
                // カウントダウン中もレンダリングだけはする
                renderer.render(scene, camera);
                return; 
            }

            if(playerStun > 0) { playerStun--; velocity *= 0.5; } 
            else {
                let accel = 0.04; let friction = 0.97;
                if (boostTimer > 0) { accel *= 1.25; friction = 0.98; boostTimer--; if(boostTimer <= 0){ shepherd.visible = false; document.getElementById('boost-bar').style.display = 'none'; } }
                
                // PC & スマホ両対応の操作
                if (keys['KeyW'] || keys['ArrowUp'] || touch.accel) velocity += accel; 
                if (keys['KeyS'] || keys['ArrowDown']) velocity -= accel;
                if (Math.abs(velocity) > 0.005) {
                    if (keys['KeyA'] || keys['ArrowLeft'] || touch.left) angle += 0.052;
                    if (keys['KeyD'] || keys['ArrowRight'] || touch.right) angle -= 0.052;
                }
                velocity *= friction;
            }

            jumpY += jumpVelocity; if(jumpY > 0) { jumpVelocity -= 0.015; } else { jumpY = 0; jumpVelocity = 0; }
            player.position.y = jumpY;
            jumpPads.forEach(j => { if(player.position.distanceTo(j.position) < 10 && jumpY <= 0.5) { jumpVelocity = 0.55; velocity += 0.6; } });
            obstacles.forEach(o => { if(player.position.distanceTo(o.position) < 5 && jumpY < 1.5) { velocity = 0; playerStun = 45; } });

            let minPlayerDist = Infinity;
            const currentT = Math.min(Math.max(player.position.z / trackLength, 0), 1);
            for (let i = -0.05; i <= 0.05; i += 0.005) {
                const t = Math.min(Math.max(currentT + i, 0), 1);
                const p = curve.getPointAt(t);
                const d = new THREE.Vector2(player.position.x, player.position.z).distanceTo(new THREE.Vector2(p.x, p.z));
                if (d < minPlayerDist) minPlayerDist = d;
            }
            if (minPlayerDist > trackRadius + 2) { velocity *= 0.82; document.getElementById('status').innerText = "🍀 OFF ROAD"; }
            else { document.getElementById('status').innerText = "🏎️ ON ROAD"; }

            player.rotation.y = angle;
            player.position.x += Math.sin(angle) * velocity;
            player.position.z += Math.cos(angle) * velocity;

            cpuStats.forEach(c => {
                if (c.stun > 0) { c.obj.rotation.y += 0.5; c.stun--; return; }
                c.t += c.speed;
                const p = curve.getPointAt(Math.min(c.t, 1));
                c.obj.position.set(p.x + c.offset, 0, p.z);
                c.obj.lookAt(curve.getPointAt(Math.min(c.t + 0.01, 1)).x + c.offset, 0, curve.getPointAt(Math.min(c.t + 0.01, 1)).z);
                boxes.forEach(b => { if (b.visible && c.obj.position.distanceTo(b.position) < 8) { b.visible = false; c.item = getRandomItem(); setTimeout(() => b.visible = true, 100); } });
                if (c.item && Math.random() < 0.005) { useItem(c.obj, c.item); c.item = null; }
            });

            activeHorns.forEach((h, index) => {
                const dir = new THREE.Vector3().subVectors(h.target.position, h.obj.position).normalize();
                h.obj.position.add(dir.multiplyScalar(3.0));
                if (h.obj.position.distanceTo(h.target.position) < 3) {
                    if (h.target === player) { velocity = 0; playerStun = 60; }
                    const stat = cpuStats.find(s => s.obj === h.target); if (stat) stat.stun = 60;
                    scene.remove(h.obj); activeHorns.splice(index, 1);
                }
                h.life--; if (h.life <= 0) { scene.remove(h.obj); activeHorns.splice(index, 1); }
            });

            activePlanes.forEach((p, index) => {
                const dir = new THREE.Vector3().subVectors(p.target.position, p.obj.position).normalize();
                p.obj.position.add(dir.multiplyScalar(2.5));
                p.obj.lookAt(p.target.position);
                if (p.obj.position.distanceTo(p.target.position) < 4) {
                    if (p.target === player) { velocity = 0; playerStun = 120; }
                    const stat = cpuStats.find(s => s.obj === p.target); if (stat) stat.stun = 120;
                    scene.remove(p.obj); activePlanes.splice(index, 1);
                }
                p.life--; if (p.life <= 0) { scene.remove(p.obj); activePlanes.splice(index, 1); }
            });

            boxes.forEach(b => { if (b.visible && player.position.distanceTo(b.position) < 8) { b.visible = false; playerItem = getRandomItem();
                const names = {'HORN':'角','MUSHROOM':'キノコ','SHEPHERD':'羊飼い','PLANE':'飛行機','TAKEO':'タケコプター'};
                document.getElementById('item-name').innerText = names[playerItem]; setTimeout(() => b.visible = true, 100); } });

            const allGoats = [{n:'You', z:player.position.z}, ...cpuStats.map(c=>({n:c.name, z:c.obj.position.z}))].sort((a,b)=>b.z-a.z);
            const myRank = allGoats.findIndex(r=>r.n==='You')+1;
            document.getElementById('rank').innerText = `Rank: ${myRank}/6`;

            if (player.position.z > 4780) { isFinished = true; document.getElementById('final-rank').innerText = `${myRank}位！`; document.getElementById('result-screen').style.display = 'block'; }

            camera.position.set(player.position.x - Math.sin(angle)*15, 8 + jumpY, player.position.z - Math.cos(angle)*15);
            camera.lookAt(player.position.x, 2 + jumpY, player.position.z);
            document.getElementById('timer').innerText = `Time: ${((Date.now()-startTime)/1000).toFixed(2)}s`;
            renderer.render(scene, camera);
        }
        animate();
        player.position.set(0,0,0);
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
